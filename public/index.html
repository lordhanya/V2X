<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>V2X - YouTube Downloader</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Sora:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <main class="container">
    <section class="hero">
      <div class="hero-icon">
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M19.615 3.184c-3.604-.246-11.631-.245-15.23 0-3.897.266-4.356 2.62-4.385 8.816.029 6.185.484 8.549 4.385 8.816 3.6.245 11.626.246 15.23 0 3.897-.266 4.356-2.62 4.385-8.816-.029-6.185-.484-8.549-4.385-8.816zm-10.615 12.816v-8l8 3.993-8 4.007z"/>
        </svg>
      </div>
      <h1 class="hero-title">V2X Downloader</h1>
      <p class="hero-subtitle">Download videos in MP3, MP4, or WAV format</p>
    </section>

    <section class="download-card">
      <form id="videoForm" class="form">
        <div class="input-wrapper">
          <svg class="input-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
            <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
          </svg>
          <input 
            type="url" 
            id="videoUrl" 
            class="url-input" 
            placeholder="Paste YouTube URL here..."
            autocomplete="off"
            required
          >
          <button type="button" id="pasteBtn" class="paste-btn" title="Paste from clipboard">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/>
              <rect x="8" y="2" width="8" height="4" rx="1" ry="1"/>
            </svg>
          </button>
        </div>

        <div class="format-options">
          <span class="section-label">Select Format</span>
          <div class="format-buttons">
            <label class="format-radio">
              <input type="radio" name="format" value="mp4" checked>
              <span class="format-btn">MP4</span>
            </label>
            <label class="format-radio">
              <input type="radio" name="format" value="mp3">
              <span class="format-btn">MP3</span>
            </label>
            <label class="format-radio">
              <input type="radio" name="format" value="wav">
              <span class="format-btn">WAV</span>
            </label>
          </div>
        </div>

        <button type="submit" id="getVideoBtn" class="submit-btn">
          <span class="btn-text">Get Video</span>
          <span class="spinner"></span>
        </button>
      </form>

      <div id="errorMessage" class="error-message hidden"></div>

      <div id="resultSection" class="result-section hidden">
        <div class="video-card">
          <div class="video-thumbnail">
            <img id="thumbnail" src="" alt="Video thumbnail">
          </div>
          <div class="video-details">
            <h2 id="videoTitle" class="video-title"></h2>
            <p id="videoUploader" class="video-uploader">
              <svg viewBox="0 0 24 24" fill="currentColor">
                <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/>
              </svg>
              <span id="uploaderText"></span>
            </p>
          </div>
        </div>

        <div class="quality-section">
          <span class="section-label">Select Quality</span>
          <div id="qualityOptions" class="quality-options"></div>
        </div>

        <button id="downloadBtn" class="download-btn" disabled>
          <span class="btn-text">Download</span>
          <span class="spinner"></span>
        </button>
      </div>
    </section>

    <footer class="footer">
      <p>Developed by <a class="author" href="https://ashifcodes.tech"><span>Md Ashif Rahman</span></a> &copy; 2026 All rights reserved</p>
    </footer>
  </main>

  <script src="/script.js"></script>
</body>
</html>
